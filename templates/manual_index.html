<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手动抽奖姬</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #03120e;
            --bg-secondary: #0a241f;
            --bg-tertiary: #10342b;
            --accent-gradient: linear-gradient(135deg, #f1c40f 0%, #d35400 100%);
            --accent-color: #f1c40f;
            --accent-glow: rgba(241, 196, 15, 0.3);
            --success: #2ecc71;
            --success-glow: rgba(46, 204, 113, 0.25);
            --danger: #e74c3c;
            --danger-glow: rgba(231, 76, 60, 0.25);
            --text-main: #e8f5f1;
            --text-muted: #7fa89f;
            --border-color: rgba(255, 255, 255, 0.07);
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.25s, border-color 0.25s, box-shadow 0.25s;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 50px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo svg {
            width: 42px;
            height: 42px;
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        /* Two-Column Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 460px 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Glassmorphic Cards */
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title svg {
            width: 22px;
            height: 22px;
            color: var(--accent-color);
        }

        /* Form styling */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.92rem;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"],
        input[type="number"] {
            flex: 1;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.92rem;
            cursor: pointer;
            border: none;
            color: white;
            transition: all 0.2s ease;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .btn-primary {
            background: var(--accent-gradient);
            box-shadow: 0 4px 15px -3px var(--accent-glow);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px -2px var(--accent-glow);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 4px 15px -3px var(--danger-glow);
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px -2px var(--danger-glow);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-action {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Entrants Table styling */
        .entrants-count {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(241, 196, 15, 0.1);
            color: var(--accent-color);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .entries-table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            text-align: left;
        }

        th {
            background-color: var(--bg-tertiary);
            padding: 12px 16px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.01);
        }

        .delete-cell-btn {
            background-color: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .delete-cell-btn:hover {
            opacity: 1;
            background-color: rgba(231, 76, 60, 0.1);
        }

        .delete-cell-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Draw Machine styling */
        .draw-board {
            background: radial-gradient(circle at center, #0f3d32 0%, #031511 100%);
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 25px var(--accent-glow);
            border-radius: 20px;
            padding: 45px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .draw-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .draw-gimmick {
            font-size: 2.4rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 15px var(--accent-glow);
            height: 60px;
            line-height: 60px;
            overflow: hidden;
            letter-spacing: 1px;
            margin: 25px 0;
            font-family: 'Outfit', sans-serif;
        }

        .draw-winner-name {
            animation: bounceIn 0.5s ease-out;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            70% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Winners Cabinet styling */
        .winners-box {
            background-color: rgba(241, 196, 15, 0.04);
            border: 1px dashed rgba(241, 196, 15, 0.25);
            border-radius: 14px;
            padding: 20px;
            margin-top: 25px;
            text-align: left;
        }

        .winners-box h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .winners-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .winner-tag {
            background-color: var(--bg-tertiary);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Toast styling */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .toast {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            max-width: 400px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            display: inline-flex;
            border-radius: 50%;
            padding: 6px;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.success .toast-icon {
            background-color: rgba(46, 204, 113, 0.1);
            color: var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.error .toast-icon {
            background-color: rgba(231, 76, 60, 0.1);
            color: var(--danger);
        }

        .toast-message {
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <div class="logo">
                <div>
                    <h1>手动抽奖姬</h1>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 2px;">登记抽奖系统</p>
                </div>
            </div>
        </header>

        <div class="dashboard-grid">

            <!-- LEFT COLUMN: ADD ENTRIES & LIST -->
            <div class="col-left">

                <!-- Manual Add Card -->
                <div class="card">
                    <div class="card-header" style="margin-bottom: 15px; padding-bottom: 10px;">
                        <div class="card-title" style="font-size: 1.1rem;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                            登记用户
                        </div>
                    </div>
                    <form id="addEntryForm" onsubmit="addEntry(event)">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="uname">输入用户名称</label>
                            <div class="input-row">
                                <input type="text" id="uname" placeholder="例如：极客猫咪" required autocomplete="off">
                                <button type="submit" class="btn btn-primary" style="padding: 12px 24px;">
                                    登记
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Entrants List Table -->
                <div class="card" style="margin-bottom: 0;">
                    <div class="card-header">
                        <div class="card-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            已登记名单
                            <span class="entrants-count" id="entrants-count">0 人</span>
                        </div>
                        <button class="btn btn-danger btn-action" onclick="clearEntries()">
                            清空登记
                        </button>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <input type="text" id="entrantSearch" placeholder="输入姓名搜索名单..." oninput="filterEntrantsTable()"
                            style="padding: 10px 14px; font-size: 0.85rem; border-radius: 8px;">
                    </div>

                    <div class="entries-table-wrapper">
                        <table id="entries-table">
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>登记时间</th>
                                    <th style="width: 50px; text-align: center;">删除</th>
                                </tr>
                            </thead>
                            <tbody id="entries-body">
                                <tr>
                                    <td colspan="3" style="text-align:center; color:var(--text-muted); padding:30px;">
                                        目前没有用户被登记，请在上方输入姓名添加喵~
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN: LOTTERY MACHINE -->
            <div class="col-right">

                <!-- Draw Machine -->
                <div class="draw-board">
                    <h3 class="draw-title">抽抽的奖</h3>

                    <div class="draw-gimmick" id="draw-scroller">
                        --- 等待开奖 ---
                    </div>

                    <div
                        style="display:flex; justify-content:center; align-items:center; gap: 15px; max-width: 400px; margin: 0 auto 10px auto;">
                        <div style="flex: 1;">
                            <label style="text-align: left; font-size: 0.8rem; margin-bottom: 4px;">中奖人数</label>
                            <input type="number" id="draw-count" min="1" value="1"
                                style="padding: 10px; border-radius: 8px;">
                        </div>
                        <button class="btn btn-primary" style="align-self: flex-end; padding: 10px 30px; height: 44px;"
                            onclick="performDraw()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            开！
                        </button>
                    </div>

                    <!-- Winners cabinet -->
                    <div class="winners-box" id="winners-box" style="display: none;">
                        <h4>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" style="width:18px; height:18px;">
                                <polygon
                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                                </polygon>
                            </svg>
                            中奖名单
                        </h4>
                        <div class="winners-list" id="winners-list">
                            <!-- Injected dynamically -->
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Toast Notifications container -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        let allEntries = [];
        let isDrawing = false;
        let clearConfirmTimeout = null;

        // Custom Toast system
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let icon = '';
            if (type === 'success') {
                icon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px;"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else if (type === 'error') {
                icon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            }

            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-message">${message}</div>
            `;

            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Fetch entries from local server
        function loadEntriesFromServer() {
            fetch('/api/entries?t=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    allEntries = data.entries || [];
                    document.getElementById('entrants-count').textContent = `${allEntries.length} 人`;

                    if (!isDrawing) {
                        renderEntrantsTable(allEntries);
                    }
                })
                .catch(err => console.error("加载名单失败:", err));
        }

        // Add user entry manually
        function addEntry(e) {
            e.preventDefault();
            const unameInput = document.getElementById('uname');
            const uname = unameInput.value.trim();
            if (!uname) return;

            fetch('/api/entries/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uname: uname })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message, 'success');
                        unameInput.value = '';
                        loadEntriesFromServer();
                    } else {
                        showToast(data.message, 'error');
                    }
                })
                .catch(err => showToast("添加通信异常", 'error'));
        }

        // Delete specific entrant by ID
        function deleteEntry(id) {
            fetch('/api/entries/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message, 'success');
                        loadEntriesFromServer();
                    } else {
                        showToast(data.message, 'error');
                    }
                })
                .catch(err => showToast("删除通信异常", 'error'));
        }

        // Render table list
        function renderEntrantsTable(entries) {
            const tbody = document.getElementById('entries-body');
            const searchVal = document.getElementById('entrantSearch').value.toLowerCase().trim();

            let filtered = entries;
            if (searchVal) {
                filtered = entries.filter(e => e.uname.toLowerCase().includes(searchVal));
            }

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align:center; color:var(--text-muted); padding:30px;">
                            ${searchVal ? '未匹配到任何登记姓名' : '目前没有观众被登记，请在上方输入姓名添加喵~'}
                        </td>
                    </tr>
                `;
                return;
            }

            const displayEntries = [...filtered].reverse();
            tbody.innerHTML = displayEntries.map(e => {
                const dateStr = new Date(e.timestamp * 1000).toLocaleTimeString();
                return `
                    <tr>
                        <td><strong>${escapeHTML(e.uname)}</strong></td>
                        <td style="color:var(--text-muted); font-size:0.8rem;">${dateStr}</td>
                        <td style="text-align: center;">
                            <button class="delete-cell-btn" onclick="deleteEntry('${e.id}')" title="删除">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterEntrantsTable() {
            renderEntrantsTable(allEntries);
        }

        // Two-step confirmation for clear entries
        function clearEntries() {
            const btn = document.querySelector('button[onclick="clearEntries()"]');
            if (!btn) return;

            if (btn.dataset.confirming === "true") {
                clearTimeout(clearConfirmTimeout);
                resetClearButton(btn);

                fetch('/api/entries/clear', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            showToast(data.message, 'success');
                            loadEntriesFromServer();
                        } else {
                            showToast(data.message, 'error');
                        }
                    })
                    .catch(err => showToast("清空名单异常", 'error'));
            } else {
                btn.dataset.confirming = "true";
                btn.textContent = "再次点击确认";
                btn.style.background = "var(--danger)";
                btn.style.borderColor = "var(--danger)";

                clearConfirmTimeout = setTimeout(() => {
                    resetClearButton(btn);
                }, 3000);
            }
        }

        function resetClearButton(btn) {
            btn.dataset.confirming = "false";
            btn.textContent = "清空登记";
            btn.style.background = "";
            btn.style.borderColor = "";
        }

        // Spin usernames and perform manual draw
        function performDraw() {
            if (isDrawing) return;
            const countInput = document.getElementById('draw-count');
            const count = parseInt(countInput.value) || 1;

            if (allEntries.length === 0) {
                showToast("当前登记名单为空，无法抽奖喵！", "error");
                return;
            }

            isDrawing = true;
            const scroller = document.getElementById('draw-scroller');

            fetch('/api/draw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ count: count })
            })
                .then(res => res.json())
                .then(async data => {
                    if (!data.success) {
                        showToast(data.message, 'error');
                        isDrawing = false;
                        return;
                    }

                    const winners = data.winners;
                    const winnersListContainer = document.getElementById('winners-list');
                    const winnersBox = document.getElementById('winners-box');

                    winnersBox.style.display = 'block';
                    winnersListContainer.innerHTML = '';

                    // Roll suspense animations for each winner sequentially
                    for (let i = 0; i < winners.length; i++) {
                        const finalWinner = winners[i];

                        await new Promise(resolve => {
                            let duration = 0;
                            const interval = setInterval(() => {
                                const tempUser = allEntries[Math.floor(Math.random() * allEntries.length)];
                                scroller.textContent = tempUser.uname;
                                duration += 60;
                                if (duration > 1500) {
                                    clearInterval(interval);
                                    resolve();
                                }
                            }, 60);
                        });

                        scroller.innerHTML = `<span class="draw-winner-name">${escapeHTML(finalWinner.uname)}</span>`;

                        // Add tag to winner list
                        const tag = document.createElement('div');
                        tag.className = 'winner-tag';
                        tag.innerHTML = `
                        <span><strong>${escapeHTML(finalWinner.uname)}</strong></span>
                        <small style="color:var(--text-muted); font-size:0.75rem;">(No. ${i + 1})</small>
                    `;
                        winnersListContainer.appendChild(tag);

                        if (i < winners.length - 1) {
                            await new Promise(r => setTimeout(r, 1200));
                        }
                    }

                    isDrawing = false;
                    showToast("抽奖全部完成喵！", "success");
                })
                .catch(err => {
                    console.error(err);
                    showToast("与服务器通信抽选错误", "error");
                    isDrawing = false;
                });
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Initialize entries lists
        window.addEventListener('load', () => {
            loadEntriesFromServer();
            // Automatically poll lists
            setInterval(loadEntriesFromServer, 2000);
        });
    </script>
</body>

</html>
